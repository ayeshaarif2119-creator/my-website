<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Product Site</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }
    header {
      background: #222;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      padding: 20px;
    }
    .card {
      background: white;
      padding: 15px;
      margin: 15px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .card img {
      width: 100%;
      border-radius: 10px;
    }
    .btn {
      display: inline-block;
      padding: 10px 15px;
      background: #ff6600;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 10px;
    }
    .btn:hover {
      background: #e65c00;
    }
  </style>
</head>
<body>

<header>
  <h1>Best Products Deals</h1>
  <p>Top picks just for you</p>
</header>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/300" alt="Product">
    <h2>Product Name</h2>
    <p>Short description of the product.</p>
    <a class="btn" href="#" target="_blank">Buy Now</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300" alt="Product">
    <h2>Another Product</h2>
    <p>Another short description.</p>
    <a class="btn" href="#" target="_blank">Buy Now</a>
  </div>

</div>

</body>
</html>
